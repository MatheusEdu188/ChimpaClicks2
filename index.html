<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChimpaClicks2</title>
    <link rel="stylesheet" href="./src/css/main.css">
    <link rel="stylesheet" href="./src/css/nav.css">
    <link rel="stylesheet" href="./src/css/upgrades.css">
</head>
<body>
    <nav class="navTop">
        <h1 class="title">Chimpa<br>Clicks</h1>
        <div class="navTopoDireito">
            <div id="pontos">
                <img src="./src/assets/imgs/icons/coin.png" alt="pontos">
                <span id="pontosValue">0</span>
            </div>
            <div id="config">
                <button>
                    <img src="./src/assets/imgs/icons/icons8-engrenagem-100.png" alt="">
                </button>
            </div>
        </div>
    </nav>


    <main>
        <article>
            <section>
                <div class="monkeyContainer">
                    <img id="chimpa" src="./src/assets/macaco_triste-removebg-preview.png" alt="chimpa">
                </div>
            </section>
        </article>
        <article class="upgrades">
            <div class="upgradesContainer">
                <header class="upgradesHeader">
                    <div class="headerContainer">
                        <h2>Upgrades</h2>
                        <span>X</span>
                    </div>
                    

                    <select name="tipo" id="tipoUpgrade">
                        <option value="1">Coins</option>
                        <option value="2">Força</option>
                        <option value="3">Aura</option>
                        <option value="4">Dano</option>
                    </select>
                </header>
                <section class="upgradesBody">
                    <ul id="upgradesList">
                        <li class="upgradeItem">
                            <div class="upgradeHeader">
                                <img class="imgUpgrade" src="./src/assets/imgs/upgrades/coinIconUpgrade.png" alt="Img">
                                <span>Upgrade 1</span>
                            </div>
                            <div class="upgradeDescription">
                                <p>Descrição do upgrade 1</p>
                                <span class="Valor"><img src="./src/assets/imgs/icons/coin.png" alt="coin">500</span>
    
                            </div>
                            <button class="btn-comprar-upgrade">Comprar</button>
                        </li>
                    </ul>
                </section>
            </div>
        </article>
    </main>


    <nav class="navfooter">
        <ul class="ul-nav-itens">
            <li class="itemNavLi">
                <button class="btn-nav"><img class="icon-nav-itens" src="./src/assets/imgs/icons/iconUpgrade.png" alt="upgrades"></button>
                <span>Upgrades</span>
                
            </li>
            <li class="itemNavLi">
                <button class="btn-nav"><img class="icon-nav-itens" src="./src/assets/imgs/icons/trainIcon.png" alt="treino"></button>
                <span>Treinar</span>
            </li>
            <li class="itemNavLi">
                <button class="btn-nav"><img class="icon-nav-itens" src="./src/assets/imgs/icons/statucIcon.gif" alt="opcoes"></button>
                <span>Status</span>
            </li>
            <li class="itemNavLi">
                <button class="btn-nav"><img class="icon-nav-itens" src="./src/assets/imgs/icons/aventuraIcon.png" alt="opcoes"></button>
                <span>Explorar</span>
            </li>
        </ul>

    </nav>





    <script type="module" src="./src/js/main.js"></script>
</body>
</html>
